<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試着室管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>試着室管理</h1>

    <!-- 受付 -->
    <section class="section">
        <h2>受付</h2>
        <div id="reception" class="reception-grid"></div>
    </section>

    <!-- 待機中 -->
    <section class="section">
        <h2>
            待機中（<span id="waitingCount">0</span>組）
        </h2>
        <div id="waitingList"></div>
    </section>

    <!-- 試着中 -->
    <section class="section">
        <h2>
            試着中（<span id="fittingCount">0</span>組）
        </h2>
        <div id="fittingList"></div>
    </section>

    <!-- 全リセット -->
    <section class="section">
        <button id="resetButton" class="reset-button">
            ⚠ 全リセット
        </button>
    </section>

</div>

<!-- ▼▼ ここに Firebase を入れる ▼▼ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA2Z0E5hcMpCdYEw0idjJnEjrUXQr7qsP4",
    authDomain: "fitting-room-4ee96.firebaseapp.com",
    databaseURL: "https://fitting-room-4ee96-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "fitting-room-4ee96",
    storageBucket: "fitting-room-4ee96.firebasestorage.app",
    messagingSenderId: "957114953314",
    appId: "1:957114953314:web:3bda5d9d66a5085e872b3b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.db = db;
  window.ref = ref;
  window.set = set;
  window.onValue = onValue;
</script>

<!-- ▼▼ Firebase の後に script.js を読み込む ▼▼ -->
<script src="script.js"></script>

</body>
</html>
